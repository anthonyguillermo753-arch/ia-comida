<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #0f172a;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo" autocomplete="off">
<input type="password" id="password" placeholder="Contraseña" autocomplete="new-password">

<button type="button" onclick="login()">Ingresar</button>

<hr>

<h3>📝 Registrarse</h3>

<input type="text" id="nombre" placeholder="Nombre" autocomplete="off">
<input type="email" id="emailRegistro" placeholder="Correo" autocomplete="off">
<input type="password" id="passwordRegistro" placeholder="Contraseña" autocomplete="new-password">

<select id="tipo">
  <option value="cliente">Cliente</option>
  <option value="proveedor">Proveedor</option>
</select>

<button type="button" onclick="registro()">Crear cuenta</button>

</div>

<script>

async function registro() {
  try {
    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("emailRegistro").value;
    const password = document.getElementById("passwordRegistro").value;
    const tipo = document.getElementById("tipo").value;

    const res = await fetch("https://ia-comida-backend.onrender.com/registro", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ nombre, email, password, tipo })
    });

    const data = await res.json();
    alert(data.mensaje);

  } catch (error) {
    console.error("ERROR:", error);
    alert("Error al registrar 😢");
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://ia-comida-backend.onrender.com/registro", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  if (res.status !== 200) {
    alert("❌ Credenciales incorrectas");
    return;
  }

  const user = await res.json();

  // 🔥 guardar usuario
  localStorage.setItem("user", JSON.stringify(user));

  alert("✅ Bienvenido " + user.nombre);

  // redirigir según tipo
  if (user.tipo === "proveedor") {
    window.location.href = "panel_proveedor.html";
  } else {
    window.location.href = "plataforma.html";
  }
}

</script>

</body>
</html>
